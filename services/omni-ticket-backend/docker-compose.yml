services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: omni_ticket
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni -d omni_ticket"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - omni-ticket-postgres:/var/lib/postgresql/data

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      OMNI_ENVIRONMENT: local
      OMNI_DATABASE_URL: postgresql+psycopg://omni:omni@postgres:5432/omni_ticket
      OMNI_INITIALIZE_DATABASE: "false"
      OMNI_ALLOWED_ORIGINS: '["http://127.0.0.1:5173","http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      OMNI_ENVIRONMENT: local
      OMNI_DATABASE_URL: postgresql+psycopg://omni:omni@postgres:5432/omni_ticket
      OMNI_INITIALIZE_DATABASE: "true"
      OMNI_ALLOWED_ORIGINS: '["http://127.0.0.1:5173","http://localhost:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: python -m app.worker --interval-seconds 60 --outbound-limit 50
    environment:
      OMNI_ENVIRONMENT: local
      OMNI_DATABASE_URL: postgresql+psycopg://omni:omni@postgres:5432/omni_ticket
      OMNI_INITIALIZE_DATABASE: "true"
      OMNI_ALLOWED_ORIGINS: '["http://127.0.0.1:5173","http://localhost:5173"]'
      OMNI_WORKER_INTERVAL_SECONDS: "60"
      OMNI_WORKER_OUTBOUND_LIMIT: "50"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  omni-ticket-postgres:
