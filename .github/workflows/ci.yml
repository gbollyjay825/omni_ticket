name: Omni Ticket CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend PWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Python Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/omni-ticket-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile backend
        run: python -m compileall app tests migrations

      - name: Lint backend
        run: ruff check app tests migrations

      - name: Typecheck backend
        run: mypy app tests

      - name: Test backend
        run: pytest -q

      - name: Verify migrations
        env:
          OMNI_DATABASE_URL: sqlite:////tmp/omni-ticket-ci-migrations.db
        run: alembic upgrade head

      - name: Smoke worker cycle
        env:
          OMNI_DATABASE_URL: sqlite:////tmp/omni-ticket-ci-worker.db
        run: python -m app.worker --once --market-id market-ng
